<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ジム無料見学・体験 - JOYFIT24経堂</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* Theme: STEALTH PERFORMANCE v2 (High Visibility Tuned) */
        :root { 
            --joy-red: #E6002D; 
            --joy-red-glow: rgba(230, 0, 45, 0.5);
            /* 背景ガラス: 透過を抑えて文字を読みやすく (0.85 -> 0.95) */
            --card-bg: rgba(30, 30, 35, 0.95); 
            /* 入力欄: 視認性を高めるため、少し明るいグレーに */
            --input-bg: rgba(255, 255, 255, 0.08);
            --input-border: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
            --text-sub: #cccccc; /* グレーを明るく */
            --border-width: 2px;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            background-color: #1a1a1a; 
            /* 背景設定は下の body::before に移動しました */
            position: relative; /* 擬似要素のために必要 */
            overflow-x: hidden;
        }

        /* ★★★ 背景画像の自動モノクロ加工設定 ★★★ */
        body::before {
            content: '';
            position: fixed; /* スクロールしても背景を固定 */
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; /* 最背面へ */

            background-image: 
                /* 黒の被せ (画像を暗くして文字を読みやすくする調整) */
                linear-gradient(135deg, rgba(40, 40, 40, 0.85) 0%, rgba(10, 10, 10, 0.9) 100%),
                
                /* ▼▼▼ ここを変更しました！ ▼▼▼ 
                   画像を index.html と同じフォルダに「gym-bg.jpg」という名前で保存してください */
                url('./gym-bg.jpg');
            
            background-size: cover;
            background-position: center;

            /* ★ CSSフィルター: これが画像を強制的にモノクロにします (0%にするとカラーに戻ります) */
            filter: grayscale(100%); 
        }

        /* テキストカラーの強制上書き (視認性向上) */
        .text-gray-800, .text-gray-700, .text-gray-600 { color: var(--text-sub) !important; }
        .text-gray-500 { color: #aaaaaa !important; } /* 薄すぎるグレーを明るく */
        .text-gray-400 { color: #888 !important; }
        
        /* カード内の背景色リセット */
        .bg-white { background-color: transparent !important; } 
        .bg-gray-50 { 
            background-color: rgba(0, 0, 0, 0.3) !important; 
            border: 1px solid rgba(255,255,255,0.1); 
        }

        /* 背景色ユーティリティ追加 */
        .bg-joy-red { background-color: var(--joy-red) !important; }
        
        /* 共通スタイル */
        .font-eng { font-family: 'Montserrat', sans-serif; letter-spacing: 0.05em; }
        .text-joy-red { color: var(--joy-red) !important; text-shadow: 0 0 15px var(--joy-red-glow); }

        /* カードデザイン: 視認性重視のダークマターガラス */
        .clipped-card {
            background: var(--card-bg) !important;
            /* ぼかしを少し弱めてシャープに */
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            /* 切り欠き */
            clip-path: polygon(
                0 20px, 20px 0, 100% 0, 
                100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%
            );
            position: relative;
            /* 影を強化して、背景から「浮き上がらせる」 */
            box-shadow: 0 25px 60px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.05) inset;
        }

        /* アクセントボーダー */
        .clipped-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, var(--joy-red) 0%, transparent 15%, transparent 85%, var(--joy-red) 100%);
            z-index: -1;
            opacity: 0.6;
        }

        /* ヘッダーエリア */
        .header-box {
            background-color: #0f0f0f !important; /* ほぼ不透明な黒でロゴを際立たせる */
            border-bottom: 3px solid var(--joy-red);
            padding-bottom: 2rem !important;
        }
        
        .header-box .bg-white {
            background: rgba(30, 30, 30, 0.8) !important;
            border: 1px solid var(--joy-red) !important;
            box-shadow: 0 0 25px rgba(230, 0, 45, 0.3) !important;
            border-radius: 4px !important;
        }

        /* プラン選択ボタン */
        .plan-radio + label { 
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: var(--text-sub) !important;
            border-radius: 4px; 
            clip-path: polygon(10% 0%, 100% 0%, 100% 100%, 0% 100%);
            transition: all 0.2s ease;
        }
        .plan-radio:checked + label {
            background: var(--joy-red) !important; 
            color: white !important;
            border-color: var(--joy-red) !important;
            box-shadow: 0 0 20px var(--joy-red-glow);
            transform: scale(1.02);
            /* 選択されたことが明確にわかるよう文字色を白で固定 */
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }
        .plan-radio:checked + label span { color: #eee !important; }

        /* 入力フィールド - 視認性向上のための最前面化処理 */
        .input-underline { 
            background: var(--input-bg) !important;
            /* 境界線をはっきりさせる */
            border: 1px solid var(--input-border) !important; 
            border-bottom: 2px solid var(--joy-red) !important;
            border-radius: 4px;
            color: white !important;
            font-weight: 500; /* 文字を少し太く */
            transition: all 0.3s ease;
            /* 内側に影を入れて奥行きを出すことで、入力エリアであることを強調 */
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
            
            /* ★高さ調整の追加: 54pxで強制統一し、ズレを解消 */
            height: 54px;
        }
        .input-underline::placeholder { color: rgba(255,255,255,0.4); }
        .input-underline:focus { 
            background: rgba(255, 255, 255, 0.15) !important; /* フォーカス時に明るく */
            border-color: rgba(255,255,255,0.5) !important;
            border-bottom-color: var(--joy-red) !important;
            box-shadow: 0 0 15px rgba(230, 0, 45, 0.4), inset 0 0 0 1px rgba(255,255,255,0.1);
            outline: none;
        }
        
        select { color: white !important; }
        option { background-color: #222; color: white; }

        /* 送信ボタン */
        .btn-solid {
            background: linear-gradient(90deg, var(--joy-red), #b30024) !important;
            color: white;
            font-weight: 900;
            border: 1px solid rgba(255,255,255,0.2);
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            box-shadow: 0 5px 25px rgba(230, 0, 45, 0.5);
            letter-spacing: 0.15em;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .btn-solid::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            transition: 0.5s;
        }
        .btn-solid:hover { 
            transform: translateY(-2px) scale(1.02); 
            box-shadow: 0 10px 40px rgba(230, 0, 45, 0.7);
            border-color: rgba(255,255,255,0.5);
        }
        .btn-solid:hover::after { left: 100%; }

        /* アニメーション */
        .animate-fade-in { animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
        .animate-slide-up { animation: slideUp 0.8s ease-out 0.2s forwards; opacity: 0; transform: translateY(20px); }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        /* 完了画面 */
        #success-message .bg-gray-50 {
            background: rgba(30, 30, 30, 0.9) !important;
            border: 1px solid var(--joy-red);
            box-shadow: 0 0 30px rgba(194, 22, 66, 0.3);
        }
        #success-message .font-bold.text-lg { color: white !important; }
        #success-message .text-gray-400 { color: #aaa !important; }
    </style>
</head>
<body class="py-10 px-4 flex flex-col items-center justify-center">

    <!-- メインコンテンツ -->
    <main class="w-full max-w-2xl z-10 space-y-6">
        
        <!-- ヘッダーエリア -->
        <section class="header-box clipped-card p-6 text-center animate-fade-in">
            <h1 class="text-white mb-2 flex items-center justify-center gap-3 flex-wrap">
                <span class="text-4xl font-bold font-sans tracking-tight">JOYFIT24</span>
                <span class="text-3xl font-bold font-sans tracking-widest">経堂</span>
            </h1>
            
            <div class="mt-4 bg-white p-3 border-4 border-joy-red shadow-[0_0_20px_rgba(194,22,66,1)] rounded-xl">
                <h2 class="text-2xl font-black text-joy-red leading-tight">
                    ジム無料見学・体験 
                </h2>
                <p class="text-sm text-gray-700 mt-1 font-eng tracking-wider">RESERVATION FORM</p>
            </div>
        </section>

        <!-- 申し込みフォーム -->
        <section id="form-section" class="neon-card clipped-card p-6 md:p-10 animate-slide-up">
            <div id="form-container">
                <form id="inquiry-form" class="space-y-8">
                    
                    <!-- STEP 1 エリア -->
                    <div class="space-y-6">
                        <!-- 区切り線 -->
                        <div class="border-b border-gray-600 pb-2 mb-4"></div>

                        <!-- プラン選択 -->
                        <div class="space-y-3">
                            <!-- テキスト変更: 白字・太字・句点なし -->
                            <p class="text-sm font-black text-white tracking-wide">見学・体験どちらかご選択ください</p>
                            <div class="grid grid-cols-2 gap-4">
                                <input type="radio" id="tour" name="plan" value="見学" class="hidden plan-radio" required checked>
                                <label for="tour" class="block text-center cursor-pointer py-4 px-2 bg-white font-bold text-lg">
                                    <span class="block text-xs font-normal mb-1 text-gray-400 font-eng">VISIT</span>
                                    見学
                                </label>
                                <input type="radio" id="trial" name="plan" value="体験" class="hidden plan-radio">
                                <label for="trial" class="block text-center cursor-pointer py-4 px-2 bg-white font-bold text-lg">
                                    <span class="block text-xs font-normal mb-1 text-gray-400 font-eng">TRIAL</span>
                                    体験
                                </label>
                            </div>
                        </div>

                        <!-- お客様情報 -->
                        <!-- 区切り線 -->
                        <div class="border-t border-gray-600 pt-4 mt-6">
                            <!-- テキスト変更: 白字・太字・句点なし -->
                            <p class="text-sm font-black text-white mb-4 tracking-wide">お客様情報をご入力ください</p>
                        </div>
                        
                        <div class="group"><label class="block text-xs font-bold text-gray-500 mb-1">お名前</label><input type="text" id="name" name="name" required placeholder="経堂 太郎" class="input-underline w-full px-4 py-3"></div>
                        <div class="group"><label class="block text-xs font-bold text-gray-500 mb-1">メールアドレス</label><input type="email" id="email" name="email" required placeholder="joyfit@example.com" class="input-underline w-full px-4 py-3"></div>
                        <div class="group"><label class="block text-xs font-bold text-gray-500 mb-1">電話番号</label><input type="tel" id="tel" name="tel" required placeholder="09012345678" inputmode="numeric" pattern="[0-9]*" class="input-underline w-full px-4 py-3"></div>
                        <div class="grid grid-cols-2 gap-6">
                            <div class="group"><label class="block text-xs font-bold text-gray-500 mb-1">性別</label><div class="relative"><select id="gender" name="gender" required class="input-underline w-full px-4 py-3 bg-transparent"><option value="">選択</option><option value="男性">男性</option><option value="女性">女性</option></select><div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-400"><svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg></div></div></div>
                            <div class="group"><label class="block text-xs font-bold text-gray-500 mb-1">年代</label><div class="relative"><select id="age" name="age" required class="input-underline w-full px-4 py-3 bg-transparent"><option value="">選択</option><option value="10代">10代</option><option value="20代">20代</option><option value="30代">30代</option><option value="40代">40代</option><option value="50代">50代</option><option value="60代以上">60+</option></select><div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-400"><svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg></div></div></div>
                        </div>
                    </div>

                    <!-- 注意事項セクション -->
                    <div class="bg-gray-50 border-l-4 border-joy-red p-4 rounded-r text-sm text-gray-600 space-y-2">
                        <p class="font-bold text-xs text-joy-red mb-2">ご確認事項</p>
                        <ul class="list-disc list-inside space-y-1 text-xs">
                            <li>館内は土足でのご利用が可能です。</li>
                            <li>体験は<span class="font-bold text-gray-800">60分を目安</span>にご利用頂いております。</li>
                            <li><span class="font-bold text-joy-red">月曜日・木曜日はスタッフ不在のため予約不可。</span></li>
                        </ul>
                        
                        <!-- スタッフ常駐時間（デザイン統一: 赤背景ラベル + 白文字 + ネオン削除） -->
                        <div class="mt-4 pt-3 border-t border-gray-700">
                            <p class="text-xs font-bold text-gray-500 mb-2 text-center">スタッフ常駐時間</p>
                            <div class="grid grid-cols-2 gap-3">
                                <!-- 平日パネル -->
                                <div class="p-2 rounded border border-gray-700 bg-white/5 flex flex-col items-center justify-center text-center">
                                    <span class="text-[10px] text-white bg-joy-red px-3 py-1 rounded mb-1 font-bold">平日</span>
                                    <span class="font-bold text-white font-eng text-sm tracking-wide">10:00 - 20:00</span>
                                </div>
                                <!-- 土日祝パネル -->
                                <div class="p-2 rounded border border-gray-700 bg-white/5 flex flex-col items-center justify-center text-center">
                                    <span class="text-[10px] text-white bg-joy-red px-3 py-1 rounded mb-1 font-bold">土日祝</span>
                                    <span class="font-bold text-white font-eng text-sm tracking-wide">12:00 - 19:00</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- STEP 2 エリア -->
                    <div class="space-y-4">
                        <!-- 区切り線 -->
                        <div class="border-b border-gray-600 pb-2 mb-4"></div>
                        
                        <div class="grid grid-cols-2 gap-6">
                            <div class="group"><label class="block text-xs font-bold text-gray-500 mb-1">ご希望日</label><input type="date" id="date" name="date" required class="input-underline w-full px-4 py-3 font-eng"></div>
                            <div class="group"><label class="block text-xs font-bold text-gray-500 mb-1">ご来館時刻</label><select id="time" name="time" required class="input-underline w-full px-4 py-3 font-eng bg-transparent" disabled><option value="">---</option></select></div>
                        </div>
                        <p id="date-error" class="text-red-600 text-xs h-4 mt-1 font-bold text-center"></p>
                    </div>

                    <!-- 送信ボタン -->
                    <div class="pt-4">
                        <button type="submit" id="submit-button" class="btn-solid w-full text-white font-black text-lg py-4 tracking-widest">上記の内容で申し込む</button>
                        <p id="submit-error" class="text-red-400 text-xs h-4 mt-3 text-center font-bold"></p>
                    </div>
                </form>
            </div>
            
            <!-- 送信完了メッセージ -->
            <div id="success-message" class="hidden text-center py-10">
                <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg animate-bounce text-white">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h2 class="text-3xl font-black text-white mb-2 font-eng">THANK YOU!</h2>
                <p class="text-gray-400 mb-8 font-medium">お申し込みを受け付けました</p>

                <div class="text-left bg-gray-50 border border-gray-200 p-6 rounded-xl max-w-md mx-auto">
                    <div class="space-y-4">
                        <div class="flex justify-between items-center border-b border-gray-600 pb-2">
                            <span class="text-xs text-gray-400 font-bold">PLAN</span>
                            <span class="font-bold text-lg text-white" id="result-plan"></span>
                        </div>
                        <div class="flex justify-between items-center border-b border-gray-600 pb-2">
                            <span class="text-xs text-gray-400 font-bold">NAME</span>
                            <span class="font-bold text-lg text-white"><span id="result-name"></span> 様</span>
                        </div>
                        <div class="flex justify-between items-center border-b border-gray-600 pb-2">
                            <span class="text-xs text-gray-400 font-bold">DATE</span>

            </div>
        </section>

        <!-- フッター -->
        <footer class="text-center py-8 text-gray-500 text-xs font-eng tracking-wider">
            <p>&copy; 2025 JOYFIT24 KYODO.</p>
        </footer>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Google Apps Script (GAS) ウェブアプリのURL
            const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycby8qQgZ1bE2eNcTHrqi9VN-ZveKjexFwDdDJObpLfxUrzz6iz6K1N2BLok9wKAJOlcl/exec';

            // --- 要素の取得 ---
            const form = document.getElementById('inquiry-form');
            const submitButton = document.getElementById('submit-button');
            const submitError = document.getElementById('submit-error');
            const dateInput = document.getElementById('date');
            const timeInput = document.getElementById('time');
            const dateError = document.getElementById('date-error');
            
            const formSection = document.getElementById('form-section');
            const formContainer = document.getElementById('form-container');
            const successMessage = document.getElementById('success-message');

            // --- 日付の初期設定 ---
            const today = new Date();
            // タイムゾーンオフセットを調整して、日付がずれないようにする
            today.setMinutes(today.getMinutes() - today.getTimezoneOffset());
            const todayString = today.toISOString().split('T')[0];
            dateInput.setAttribute('min', todayString);

            // --- 時間選択肢を動的に生成 ---
            function populateTimeSlots(startHour, endHour) {
                timeInput.innerHTML = ''; 
                
                const defaultOption = document.createElement('option');
                defaultOption.value = "";
                defaultOption.textContent = "TIME SELECT";
                timeInput.appendChild(defaultOption);

                // 30分刻みで時間を生成
                for (let h = startHour; h <= endHour; h++) {
                    for (let m = 0; m < 60; m += 30) {
                        // 終了時刻ぴったりは含めない
                        if (h === endHour && m > 0) continue;
                        // 20:00など、終了時刻自体は含めない (例: 10:00-20:00 の場合、19:30まで)
                        if (h === endHour && m === 0) continue; 

                        const timeString = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
                        const option = document.createElement('option');
                        option.value = timeString;
                        option.textContent = timeString;
                        timeInput.appendChild(option);
                    }
                }
            }

            // --- 日付選択時のイベント処理 ---
            dateInput.addEventListener('input', function() {
                const dateParts = this.value.split('-').map(Number);
                // Dateオブジェクトを作成する際に、ISO形式ではなく年/月/日を使用することで、ローカルタイムゾーンで日付がずれるのを防ぐ
                const localDate = new Date(dateParts[0], dateParts[1] - 1, dateParts[2]);
                const dayOfWeek = localDate.getDay(); // 0=日曜, 1=月曜, ..., 6=土曜

                dateError.textContent = '';
                timeInput.disabled = true;
                timeInput.innerHTML = '<option value="">---</option>';

                if (!this.value) return;

                // 月曜日 (1) または 木曜日 (4) は予約不可
                if (dayOfWeek === 1 || dayOfWeek === 4) {
                    this.value = ''; // 日付をクリア
                    dateError.textContent = 'MON & THU CLOSED (月曜・木曜はスタッフ不在)';
                    return;
                }

                // 土曜日 (6) または 日曜日 (0) は土日祝の時間帯 (12:00-19:00)
                if (dayOfWeek === 0 || dayOfWeek === 6) { 
                    populateTimeSlots(12, 19); 
                } else { 
                    // 平日 (火、水、金) は平日の時間帯 (10:00-20:00)
                    populateTimeSlots(10, 20); 
                }
                timeInput.disabled = false;
            });

            // --- フォーム送信時の処理 ---
            form.addEventListener('submit', function(e) {
                e.preventDefault();

                if (!GAS_WEB_APP_URL) {
                    submitError.textContent = 'エラー: GASウェブアプリのURLが設定されていません。';
                    return;
                }

                submitError.textContent = '';
                submitButton.disabled = true;
                submitButton.textContent = '送信中...'; // ローディングテキスト
                submitButton.classList.add('opacity-70');

                const formData = new FormData(form);
                const data = Object.fromEntries(formData.entries());

                // GASへの送信処理
                fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    // GASはCORS非対応のため 'no-cors' を使用。この場合、.then() の中ではレスポンス内容を確認できない。
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded', },
                    // GAS側でJSONを受け取る設定をしているため、JSON.stringify(data)で送信
                    body: JSON.stringify(data) 
                })
                .then(() => {
                    // no-corsモードでは常に成功の応答が返るため、ここでは単にUIを更新する
                    // 実際には、GAS側でエラーが発生している可能性もある点に注意
                    document.getElementById('result-plan').textContent = data.plan;
                    document.getElementById('result-name').textContent = data.name;
                    
                    const dateString = data.date.replace(/-/g, '/');
                    // 完了メッセージ用に日付を 'MM/DD' 形式に整形
                    const formattedDate = `${new Date(dateString).getMonth() + 1}/${new Date(dateString).getDate()}`;
                    
                    document.getElementById('result-datetime').textContent = `${formattedDate} ${data.time}`;

                    formContainer.classList.add('hidden');
                    successMessage.classList.remove('hidden');
                    // 完了メッセージまでスクロール
                    formSection.scrollIntoView({ behavior: 'smooth' });
                })
                .catch(error => {
                    console.error('Error:', error);
                    // no-corsモードではネットワークエラーのみ捕捉
                    submitError.textContent = 'システムエラーが発生しました。再度お試しください。';
                })
                .finally(() => {
                    // 成功メッセージが表示されていない場合（エラーの場合）のみ、ボタンを元に戻す
                    if(successMessage.classList.contains('hidden')) {
                         submitButton.disabled = false;
                         submitButton.textContent = '上記の内容で申し込む';
                         submitButton.classList.remove('opacity-70');
                    }
                });
            });
        });
    </script>
</body>
</html>
