<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ジム無料見学・体験 - JOYFIT24経堂</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --logo-wine-bg: #A63646;
            --brand-red: #A63646;
            --brand-red-dark: #852c38;
            --brand-red-soft: rgba(166, 54, 70, 0.18);
            --ink: #111827;
            --muted: #6B7280;
            --line: #E5E7EB;
            --surface: #FFFFFF;
            --radius: 0.75rem;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            color: #F3F4F6;
            min-height: 100vh;
            background-color: var(--logo-wine-bg);
            position: relative;
            overflow-x: hidden;
        }

        .font-eng { font-family: 'Montserrat', sans-serif; letter-spacing: 0.05em; }
        .text-brand-red { color: var(--brand-red) !important; }
        .bg-brand-red { background-color: var(--brand-red) !important; }

        .lp-card {
            background: var(--surface) !important;
            color: var(--ink);
            border: 1px solid var(--line);
            border-radius: 1.25rem;
            border-top: 3px solid var(--brand-red);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.45);
        }

        .page-title-card {
            background: #FAFBFC;
            border: 1px solid var(--line);
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(17, 24, 39, 0.08);
        }

        .plan-radio + label {
            background: #FAFBFC !important;
            border: 1px solid var(--line) !important;
            color: var(--ink) !important;
            border-radius: var(--radius);
            transition: all 0.2s ease;
        }
        .plan-radio + label span { color: var(--muted) !important; }
        .plan-radio:checked + label {
            background: var(--brand-red) !important;
            color: #fff !important;
            border-color: var(--brand-red) !important;
            box-shadow: 0 0 0 3px var(--brand-red-soft);
            transform: translateY(-1px);
            text-shadow: none;
        }
        .plan-radio:checked + label span { color: rgba(255,255,255,0.9) !important; }

        .input-underline {
            width: 100%;
            box-sizing: border-box;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            line-height: 1.5;
            color: var(--ink) !important;
            background-color: #FAFBFC !important;
            border: 1px solid var(--line) !important;
            border-radius: var(--radius);
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            height: 54px;
            box-shadow: none;
        }
        .input-underline::placeholder { color: #9CA3AF; }
        .input-underline:focus {
            outline: none;
            border-color: var(--brand-red) !important;
            background-color: var(--surface) !important;
            box-shadow: 0 0 0 3px var(--brand-red-soft) !important;
        }

        select.input-underline {
            padding-right: 2.5rem;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236B7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.75rem center;
            background-repeat: no-repeat;
            background-size: 1.25em 1.25em;
        }
        option { background-color: #fff; color: var(--ink); }

        .btn-solid {
            width: 100%;
            background-color: var(--brand-red) !important;
            color: #fff;
            font-weight: 800;
            border: none;
            border-radius: var(--radius);
            padding: 0.95rem 1rem;
            letter-spacing: 0.06em;
            transition: background-color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
            box-shadow: 0 8px 20px rgba(166, 54, 70, 0.28);
            clip-path: none;
        }
        .btn-solid:hover {
            transform: translateY(-1px);
            background-color: var(--brand-red-dark) !important;
            box-shadow: 0 14px 26px rgba(166, 54, 70, 0.34);
        }

        .notice-card {
            border-radius: var(--radius);
            border: 1px solid var(--line);
            background: #FAFBFC;
            border-top: 3px solid var(--brand-red);
        }

        .site-footer-bar {
            background-color: var(--logo-wine-bg);
            padding: 1.25rem 1rem;
            color: rgba(255,255,255,0.9);
        }
        .site-footer-bar .footer-logo-img {
            height: 2rem;
            width: auto;
            max-width: min(100%, 220px);
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body class="py-10 px-4 flex flex-col items-center justify-center">

    <main class="w-full max-w-2xl z-10 space-y-6">

        <section class="lp-card p-6 text-center">
            <h1 class="text-white mb-2 flex items-center justify-center gap-3 flex-wrap">
                <span class="text-4xl font-black font-sans tracking-tight">JOYFIT24</span>
                <span class="text-3xl font-black font-sans tracking-widest">経堂</span>
            </h1>

            <div class="mt-4 page-title-card p-3">
                <h2 class="text-2xl font-black text-brand-red leading-tight">
                    ジム無料見学・体験
                </h2>
                <p class="text-sm text-gray-600 mt-1 font-eng tracking-wider">RESERVATION FORM</p>
            </div>
        </section>

        <section id="form-section" class="lp-card p-6 md:p-10">
            <div id="form-container">
                <form id="inquiry-form" class="space-y-8">

                    <div class="space-y-6">
                        <div class="border-b border-gray-200 pb-2 mb-4"></div>

                        <div class="space-y-3">
                            <p class="text-sm font-black text-gray-900 tracking-wide">見学・体験どちらかご選択ください</p>
                            <div class="grid grid-cols-2 gap-4">
                                <input type="radio" id="tour" name="plan" value="見学" class="hidden plan-radio" required checked>
                                <label for="tour" class="block text-center cursor-pointer py-4 px-2 font-bold text-lg">
                                    <span class="block text-xs font-normal mb-1 font-eng">VISIT</span>
                                    見学
                                </label>
                                <input type="radio" id="trial" name="plan" value="体験" class="hidden plan-radio">
                                <label for="trial" class="block text-center cursor-pointer py-4 px-2 font-bold text-lg">
                                    <span class="block text-xs font-normal mb-1 font-eng">TRIAL</span>
                                    体験
                                </label>
                            </div>
                        </div>

                        <div class="border-t border-gray-200 pt-4 mt-6">
                            <p class="text-sm font-black text-gray-900 mb-4 tracking-wide">お客様情報をご入力ください</p>
                        </div>

                        <div class="group">
                            <label class="block text-xs font-bold text-gray-600 mb-1">お名前</label>
                            <input type="text" id="name" name="name" required placeholder="経堂 太郎" class="input-underline px-4 py-3">
                        </div>
                        <div class="group">
                            <label class="block text-xs font-bold text-gray-600 mb-1">メールアドレス</label>
                            <input type="email" id="email" name="email" required placeholder="joyfit@example.com" class="input-underline px-4 py-3">
                        </div>
                        <div class="group">
                            <label class="block text-xs font-bold text-gray-600 mb-1">電話番号</label>
                            <input type="tel" id="tel" name="tel" required placeholder="09012345678" inputmode="numeric" pattern="[0-9]*" class="input-underline px-4 py-3">
                        </div>
                        <div class="grid grid-cols-2 gap-6">
                            <div class="group">
                                <label class="block text-xs font-bold text-gray-600 mb-1">性別</label>
                                <div class="relative">
                                    <select id="gender" name="gender" required class="input-underline px-4 py-3 bg-transparent">
                                        <option value="">選択</option>
                                        <option value="男性">男性</option>
                                        <option value="女性">女性</option>
                                    </select>
                                </div>
                            </div>
                            <div class="group">
                                <label class="block text-xs font-bold text-gray-600 mb-1">年代</label>
                                <div class="relative">
                                    <select id="age" name="age" required class="input-underline px-4 py-3 bg-transparent">
                                        <option value="">選択</option>
                                        <option value="10代">10代</option>
                                        <option value="20代">20代</option>
                                        <option value="30代">30代</option>
                                        <option value="40代">40代</option>
                                        <option value="50代">50代</option>
                                        <option value="60代以上">60+</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="notice-card p-4 text-sm text-gray-700 space-y-2">
                        <p class="font-bold text-xs text-brand-red mb-2">ご確認事項</p>
                        <ul class="list-disc list-inside space-y-1 text-xs">
                            <li>館内は土足でのご利用が可能です。</li>
                            <li>体験は<span class="font-bold text-gray-900">60分を目安</span>にご利用頂いております。</li>
                            <li><span class="font-bold text-brand-red">月曜日・木曜日はスタッフ不在のため予約不可。</span></li>
                        </ul>

                        <div class="mt-4 pt-3 border-t border-gray-200">
                            <p class="text-xs font-bold text-gray-600 mb-2 text-center">スタッフ常駐時間</p>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="p-3 rounded border border-gray-200 bg-white flex flex-col items-center justify-center text-center">
                                    <span class="text-[10px] text-white bg-brand-red px-3 py-1 rounded mb-1 font-bold">平日</span>
                                    <span class="font-bold text-gray-900 font-eng text-sm tracking-wide">10:00 - 20:00</span>
                                </div>
                                <div class="p-3 rounded border border-gray-200 bg-white flex flex-col items-center justify-center text-center">
                                    <span class="text-[10px] text-white bg-brand-red px-3 py-1 rounded mb-1 font-bold">土日祝</span>
                                    <span class="font-bold text-gray-900 font-eng text-sm tracking-wide">12:00 - 19:00</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <div class="border-b border-gray-200 pb-2 mb-4"></div>

                        <div class="grid grid-cols-2 gap-6">
                            <div class="group">
                                <label class="block text-xs font-bold text-gray-600 mb-1">ご希望日</label>
                                <input type="date" id="date" name="date" required class="input-underline px-4 py-3 font-eng">
                            </div>
                            <div class="group">
                                <label class="block text-xs font-bold text-gray-600 mb-1">ご来館時刻</label>
                                <select id="time" name="time" required class="input-underline px-4 py-3 font-eng bg-transparent" disabled>
                                    <option value="">---</option>
                                </select>
                            </div>
                        </div>
                        <p id="date-error" class="text-red-600 text-xs h-4 mt-1 font-bold text-center"></p>
                    </div>

                    <div class="pt-4">
                        <button type="submit" id="submit-button" class="btn-solid text-white font-black text-lg py-4 tracking-widest">上記の内容で申し込む</button>
                        <p id="submit-error" class="text-red-600 text-xs h-4 mt-3 text-center font-bold"></p>
                    </div>
                </form>
            </div>

            <div id="success-message" class="hidden text-center py-10">
                <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg text-white">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h2 class="text-3xl font-black text-white mb-2 font-eng">THANK YOU!</h2>
                <p class="text-white/80 mb-8 font-medium">お申し込みを受け付けました</p>

                <div class="lp-card text-left p-6 rounded-xl max-w-md mx-auto">
                    <div class="space-y-4">
                        <div class="flex justify-between items-center border-b border-gray-200 pb-2">
                            <span class="text-xs text-gray-600 font-bold">PLAN</span>
                            <span class="font-bold text-lg text-gray-900" id="result-plan"></span>
                        </div>
                        <div class="flex justify-between items-center border-b border-gray-200 pb-2">
                            <span class="text-xs text-gray-600 font-bold">NAME</span>
                            <span class="font-bold text-lg text-gray-900"><span id="result-name"></span> 様</span>
                        </div>
                        <div class="flex justify-between items-center border-b border-gray-200 pb-2">
                            <span class="text-xs text-gray-600 font-bold">DATE</span>
                            <span class="font-bold text-xl text-brand-red font-eng" id="result-datetime"></span>
                        </div>
                    </div>
                </div>
                <p class="text-xs text-white/70 mt-6">スクリーンショットを保存してください</p>
            </div>
        </section>

        <footer class="site-footer-bar border-t border-white/10 rounded-xl">
            <div class="container mx-auto text-center">
                <img src="joyfit_logo.png" alt="JOYFIT24" class="footer-logo-img">
            </div>
        </footer>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Google Apps Script (GAS) ウェブアプリのURL
            const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycby8qQgZ1bE2eNcTHrqi9VN-ZveKjexFwDdDJObpLfxUrzz6iz6K1N2BLok9wKAJOlcl/exec';

            // --- 要素の取得 ---
            const form = document.getElementById('inquiry-form');
            const submitButton = document.getElementById('submit-button');
            const submitError = document.getElementById('submit-error');
            const dateInput = document.getElementById('date');
            const timeInput = document.getElementById('time');
            const dateError = document.getElementById('date-error');

            const formSection = document.getElementById('form-section');
            const formContainer = document.getElementById('form-container');
            const successMessage = document.getElementById('success-message');

            // --- 日付の初期設定 ---
            const today = new Date();
            // タイムゾーンオフセットを調整して、日付がずれないようにする
            today.setMinutes(today.getMinutes() - today.getTimezoneOffset());
            const todayString = today.toISOString().split('T')[0];
            dateInput.setAttribute('min', todayString);

            // --- 時間選択肢を動的に生成 ---
            function populateTimeSlots(startHour, endHour) {
                timeInput.innerHTML = '';

                const defaultOption = document.createElement('option');
                defaultOption.value = "";
                defaultOption.textContent = "TIME SELECT";
                timeInput.appendChild(defaultOption);

                // 30分刻みで時間を生成
                for (let h = startHour; h <= endHour; h++) {
                    for (let m = 0; m < 60; m += 30) {
                        // 終了時刻ぴったりは含めない
                        if (h === endHour && m > 0) continue;
                        // 20:00など、終了時刻自体は含めない (例: 10:00-20:00 の場合、19:30まで)
                        if (h === endHour && m === 0) continue;

                        const timeString = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
                        const option = document.createElement('option');
                        option.value = timeString;
                        option.textContent = timeString;
                        timeInput.appendChild(option);
                    }
                }
            }

            // --- 日付選択時のイベント処理 ---
            dateInput.addEventListener('input', function() {
                const dateParts = this.value.split('-').map(Number);
                // Dateオブジェクトを作成する際に、ISO形式ではなく年/月/日を使用することで、ローカルタイムゾーンで日付がずれるのを防ぐ
                const localDate = new Date(dateParts[0], dateParts[1] - 1, dateParts[2]);
                const dayOfWeek = localDate.getDay(); // 0=日曜, 1=月曜, ..., 6=土曜

                dateError.textContent = '';
                timeInput.disabled = true;
                timeInput.innerHTML = '<option value="">---</option>';

                if (!this.value) return;

                // 月曜日 (1) または 木曜日 (4) は予約不可
                if (dayOfWeek === 1 || dayOfWeek === 4) {
                    this.value = ''; // 日付をクリア
                    dateError.textContent = 'MON & THU CLOSED (月曜・木曜はスタッフ不在)';
                    return;
                }

                // 土曜日 (6) または 日曜日 (0) は土日祝の時間帯 (12:00-19:00)
                if (dayOfWeek === 0 || dayOfWeek === 6) {
                    populateTimeSlots(12, 19);
                } else {
                    // 平日 (火、水、金) は平日の時間帯 (10:00-20:00)
                    populateTimeSlots(10, 20);
                }
                timeInput.disabled = false;
            });

            // --- フォーム送信時の処理 ---
            form.addEventListener('submit', function(e) {
                e.preventDefault();

                if (!GAS_WEB_APP_URL) {
                    submitError.textContent = 'エラー: GASウェブアプリのURLが設定されていません。';
                    return;
                }

                submitError.textContent = '';
                submitButton.disabled = true;
                submitButton.textContent = '送信中...'; // ローディングテキスト
                submitButton.classList.add('opacity-70');

                const formData = new FormData(form);
                const data = Object.fromEntries(formData.entries());

                // GASへの送信処理
                fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    // GASはCORS非対応のため 'no-cors' を使用。この場合、.then() の中ではレスポンス内容を確認できない。
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded', },
                    // GAS側でJSONを受け取る設定をしているため、JSON.stringify(data)で送信
                    body: JSON.stringify(data)
                })
                .then(() => {
                    // no-corsモードでは常に成功の応答が返るため、ここでは単にUIを更新する
                    // 実際には、GAS側でエラーが発生している可能性もある点に注意
                    document.getElementById('result-plan').textContent = data.plan;
                    document.getElementById('result-name').textContent = data.name;

                    const dateString = data.date.replace(/-/g, '/');
                    // 完了メッセージ用に日付を 'MM/DD' 形式に整形
                    const formattedDate = `${new Date(dateString).getMonth() + 1}/${new Date(dateString).getDate()}`;

                    document.getElementById('result-datetime').textContent = `${formattedDate} ${data.time}`;

                    formContainer.classList.add('hidden');
                    successMessage.classList.remove('hidden');
                    // 完了メッセージまでスクロール
                    formSection.scrollIntoView({ behavior: 'smooth' });
                })
                .catch(error => {
                    console.error('Error:', error);
                    // no-corsモードではネットワークエラーのみ捕捉
                    submitError.textContent = 'システムエラーが発生しました。再度お試しください。';
                })
                .finally(() => {
                    // 成功メッセージが表示されていない場合（エラーの場合）のみ、ボタンを元に戻す
                    if(successMessage.classList.contains('hidden')) {
                        submitButton.disabled = false;
                        submitButton.textContent = '上記の内容で申し込む';
                        submitButton.classList.remove('opacity-70');
                    }
                });
            });
        });
    </script>
</body>
</html>
